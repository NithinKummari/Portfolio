
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nithin Kummari - Animated Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* For custom scrollbar, optional */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0F172A; /* slate-900 or similar dark */
    }
    ::-webkit-scrollbar-thumb {
      background: #2563eb; /* blue-600 */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #1d4ed8; /* blue-700 */
    }
    body {
      font-family: 'Inter', sans-serif; /* A nice sans-serif font, Tailwind often defaults to system fonts */
      /* Animated Gradient Background */
      background: linear-gradient(-45deg, #0F172A, #1E293B, #0F172A, #1D4ED8); /* slate-900, slate-800, slate-900, blue-700 */
      background-size: 400% 400%;
      animation: gradientBG 25s ease infinite;
      color: #e2e8f0; /* slate-200, adjusted for better contrast on animated bg */
      scroll-behavior: smooth;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Fallback for Inter if not available via Tailwind/browser */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    /* Ensure root and html take full height for preloader and sticky elements */
    html, body, #root {
        height: 100%;
    }
    #root > div { /* Assuming App's main div is the direct child */
        min-height: 100%;
        display: flex;
        flex-direction: column;
    }

  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.4.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-950 text-slate-100 antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
